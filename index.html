<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Cá Nhân</title>
    <!-- Nhúng phông chữ từ Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #FFFFFF;
            --text-main: #252121;
            --accent: #F26822;
        }
        body {
            font-family: 'Source Serif Pro', serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 48px 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 80px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }
        p {
            font-size: 18px;
            line-height: 1.65;
        }
        .btn {
            display: inline-block;
            background-color: var(--text-main);
            color: #FFFFFF;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            margin-top: 24px;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #111111;
        }
    </style>
</head>
<body>
    <h1>Hello World.</h1>
    <p>Đây là bài viết đầu tiên trên blog cá nhân, được thiết kế theo phong cách trực diện, tập trung vào con chữ.</p>
    <a href="#" class="btn">Đọc thêm</a>
</body>
</html>
