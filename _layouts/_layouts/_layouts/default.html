<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #FFFFFF;
            --text-main: #252121;
            --accent: #F26822;
        }
        body {
            font-family: 'Source Serif Pro', serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 48px 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1, h2, h3, h4 {
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
        }
        h1 {
            font-size: 80px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }
        p {
            font-size: 18px;
            line-height: 1.65;
        }
        a {
            color: var(--accent);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    {{ content }}
</body>
</html>
