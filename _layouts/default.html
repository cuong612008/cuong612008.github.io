<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Blog Cá Nhân</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-white: #FFFFFF;
            --bg-gray: #DAE5E6;
            --text-dark: #252121;
            --text-light: #AAAAAA;
            --accent: #F26822;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Source Serif Pro', serif;
            background-color: var(--bg-white);
            color: var(--text-dark);
            margin: 0;
            line-height: 1.65;
        }
        /* --- HEADER --- */
        header {
            background-color: var(--bg-gray);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 800;
            text-decoration: none;
            color: var(--text-dark);
            letter-spacing: -0.02em;
        }
        nav a {
            font-family: 'Source Serif Pro', serif;
            font-size: 16px;
            color: var(--text-dark);
            text-decoration: none;
            margin-left: 24px;
            transition: color 0.2s;
        }
        nav a:hover { color: var(--accent); }
        
        /* --- LAYOUT CHÍNH --- */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        /* --- TYPOGRAPHY --- */
        h1, h2, h3, h4, h5, h6 { font-family: 'Montserrat', sans-serif; color: var(--text-dark); }
        h1 { font-size: 80px; font-weight: 700; line-height: 1.2; letter-spacing: -0.02em; margin-top: 0; }
        h4 { font-size: 24px; font-weight: 800; margin-bottom: 24px; text-transform: uppercase; }
        
        /* --- NÚT BẤM (BUTTONS) --- */
        .btn {
            display: inline-block;
            background-color: var(--text-dark);
            color: #FFFFFF;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            text-transform: uppercase;
            transition: background-color 0.3s;
        }
        .btn:hover { background-color: #111111; color: #FFFFFF; }

        /* --- THẺ BÀI VIẾT (CARDS) --- */
        .post-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .card {
            border: 1px solid var(--bg-gray);
            border-radius: 6px;
            padding: 32px;
            transition: border-color 0.3s;
        }
        .card:hover { border: 2px solid var(--text-dark); padding: 31px; /* bù lại 1px viền tăng lên */ }
        .card-date {
            font-family: 'Montserrat', sans-serif;
            font-size: 10.4px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .card-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            text-decoration: none;
            display: block;
            line-height: 1.3;
            margin-bottom: 16px;
        }
        .card-title:hover { color: var(--accent); }
        .card-excerpt { font-size: 16px; color: #495A5F; margin-bottom: 0; }

        /* --- CHÂN TRANG --- */
        footer {
            text-align: center;
            padding: 48px 24px;
            border-top: 1px solid var(--bg-gray);
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            color: var(--text-light);
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 48px; }
            header { flex-direction: column; gap: 16px; }
            nav a { margin: 0 12px; }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">CUONG NGUYEN</a>
        <nav>
            <a href="/">Bài viết</a>
            <a href="#">Giới thiệu</a>
            <a href="#">Bản tin</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        &copy; 2026 Cuong Nguyen. Thiết kế lấy cảm hứng từ Mark Manson.
    </footer>
</body>
</html>
